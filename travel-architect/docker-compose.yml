version: "3.9"

services:
  backend:
    build: ./backend
    container_name: travel_backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - travel_network

  frontend:
    build: ./frontend
    container_name: travel_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - travel_network

networks:
  travel_network:
    driver: bridge
